<!DOCTYPE html>
<html>
<head>
    <title>Anodate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            width: 600px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .header {
            background: #ff4d6d;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            position: relative;
            font-size: 18px;
        }

        .settings-btn {
            position: absolute;
            right: 20px;
            top: 15px;
            cursor: pointer;
        }

        .start-btn {
            margin: 15px;
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .message {
            padding: 14px 18px;
            margin: 8px 0;
            border-radius: 25px;
            max-width: 80%;
            font-size: 16px;
        }

        .me {
            background: #ff4d6d;
            color: white;
            align-self: flex-end;
        }

        .stranger {
            background: #f1f0f0;
            align-self: flex-start;
        }

        .system {
            text-align: center;
            font-size: 13px;
            color: gray;
            margin: 5px 0;
        }

        .input-area {
            display: flex;
            padding: 15px;
            border-top: 1px solid #ddd;
        }

        .input-area input {
            flex: 1;
            padding: 14px;
            border-radius: 25px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .settings-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: none;
            justify-content: center;
            align-items: center;
        }

        .settings-box {
            background: white;
            width: 85%;
            padding: 20px;
            border-radius: 20px;
        }

        .settings-box h3 {
            margin-top: 0;
            text-align: center;
        }

        .settings-box select {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .save-btn {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: #ff4d6d;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        🔥 Anodate
        <span class="settings-btn" onclick="toggleSettings()">⚙</span>
    </div>

    <button id="findBtn" class="start-btn" onclick="findPartner()">Tìm người mới</button>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="msgInput" placeholder="Nhập tin nhắn..." disabled>
        <button onclick="sendMessage()">Gửi</button>
    </div>

    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-box">
            <h3>Cài đặt</h3>

            Giới tính của bạn:
            <select id="myGender">
                <option value="">-- Chọn --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Khác">Khác</option>
            </select>

            Bạn muốn tìm:
            <select id="findGender">
                <option value="">-- Chọn --</option>
                <option value="Nam">Nam</option>
                <option value="Nữ">Nữ</option>
                <option value="Any">Bất kỳ</option>
            </select>

            <button class="save-btn" onclick="saveSettings()">Lưu</button>
        </div>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let connected = false;
let myGender = "";
let findGender = "";

function toggleSettings() {
    const overlay = document.getElementById("settingsOverlay");
    overlay.style.display = overlay.style.display === "flex" ? "none" : "flex";
}

function saveSettings() {
    myGender = document.getElementById("myGender").value;
    findGender = document.getElementById("findGender").value;

    if (!myGender || !findGender) {
        alert("Vui lòng chọn đầy đủ!");
        return;
    }

    addSystem("Đã lưu cài đặt.");
    toggleSettings();

    // 🔥 TỰ ĐỘNG TÌM NGƯỜI
    socket.emit("findPartner", { myGender, findGender });
    addSystem("Đang tìm người phù hợp...");
}

function findPartner() {
    if (!myGender || !findGender) {
        alert("Vào ⚙ Cài đặt trước!");
        return;
    }

    socket.emit("findPartner", { myGender, findGender });
    addSystem("Đang tìm người phù hợp...");
}

function sendMessage() {
    if (!connected) return;

    const input = document.getElementById("msgInput");
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "me");
    socket.emit("chatMessage", msg);
    input.value = "";
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;
}

function addSystem(text) {
    const div = document.createElement("div");
    div.classList.add("system");
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
}

socket.on("matched", (gender) => {
    connected = true;
    document.getElementById("msgInput").disabled = false;
    addSystem("Bạn đã kết nối với một " + gender);
});

socket.on("waiting", () => {
    connected = false;
    addSystem("Đang chờ người phù hợp...");
});

socket.on("chatMessage", (msg) => {
    addMessage(msg, "stranger");
});

socket.on("partnerLeft", () => {
    connected = false;
    document.getElementById("msgInput").disabled = true;

    addSystem("Người kia đã rời cuộc trò chuyện.");
    addSystem("Ấn nút 'Tìm người mới' bên trên để tìm người khác.");
});

document.getElementById("msgInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
