<!DOCTYPE html>
<html>
<head>
<title>Anodate</title>
<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    width: 600px;
    height: 680px;
    background: white;
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    position: relative;
}

.header {
    background: #ff4d6d;
    color: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    position: relative;
}

.settings-btn {
    position: absolute;
    right: 15px;
    top: 15px;
    cursor: pointer;
}

.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    padding: 10px 14px;
    margin: 6px 0;
    border-radius: 18px;
    max-width: 70%;
}

.me {
    background: #dcf8c6;
    align-self: flex-end;
}

.stranger {
    background: #f1f0f0;
    align-self: flex-start;
}

.system {
    text-align: center;
    font-size: 12px;
    color: gray;
    margin: 5px 0;
}

.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    align-items: center;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

.send-btn {
    margin-left: 8px;
    padding: 10px 18px;
    border: none;
    border-radius: 20px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

.leave-btn {
    margin-left: 8px;
    background: #ffe0e6;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
}

.leave-btn:hover {
    background: #ffccd5;
}

.start-btn {
    margin: 10px;
    padding: 10px;
    border: none;
    border-radius: 20px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

.settings-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 2px solid #ff4d6d;
    padding: 20px;
    display: none;
}

/* ===== POPUP ===== */

.popup-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    animation: fadeIn 0.2s ease;
}

.popup h3 {
    margin-top: 0;
}

.popup-buttons {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
}

.popup-buttons button {
    flex: 1;
    margin: 0 5px;
    padding: 10px;
    border: none;
    border-radius: 20px;
    cursor: pointer;
}

.cancel-btn {
    background: #ddd;
}

.confirm-btn {
    background: #ff4d6d;
    color: white;
}

@keyframes fadeIn {
    from { transform: scale(0.9); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        🔥 Anodate 🔥
        <span class="settings-btn" onclick="toggleSettings()">⚙</span>
    </div>

    <button class="start-btn" onclick="findPartner()">Tìm người mới</button>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="msgInput" placeholder="Nhập tin nhắn..." disabled />
        <button class="send-btn" onclick="sendMessage()">Gửi</button>
        <button class="leave-btn" onclick="openPopup()">🚪</button>
    </div>

    <!-- POPUP -->
    <div class="popup-overlay" id="popup">
        <div class="popup">
            <h3>Thoát cuộc trò chuyện?</h3>
            <p>Bạn có chắc chắn muốn rời đi không?</p>
            <div class="popup-buttons">
                <button class="cancel-btn" onclick="closePopup()">Ở lại</button>
                <button class="confirm-btn" onclick="leaveChat()">Thoát</button>
            </div>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let connected = false;

function findPartner() {
    socket.emit("findPartner", { myGender: "Nam", findGender: "Any" });
    addSystem("Đang tìm người...");
}

function sendMessage() {
    if (!connected) return;
    const input = document.getElementById("msgInput");
    const msg = input.value.trim();
    if (!msg) return;
    addMessage(msg, "me");
    socket.emit("chatMessage", msg);
    input.value = "";
}

function openPopup() {
    if (!connected) return;
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function leaveChat() {
    socket.emit("leaveChat");
    connected = false;
    document.getElementById("msgInput").disabled = true;
    addSystem("Bạn đã rời cuộc trò chuyện.");
    closePopup();
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;
}

function addSystem(text) {
    const div = document.createElement("div");
    div.classList.add("system");
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
}

socket.on("matched", () => {
    connected = true;
    document.getElementById("msgInput").disabled = false;
    addSystem("Đã kết nối!");
});

socket.on("chatMessage", (msg) => {
    addMessage(msg, "stranger");
});

socket.on("partnerLeft", () => {
    connected = false;
    document.getElementById("msgInput").disabled = true;
    addSystem("Người kia đã rời đi.");
});

</script>

</body>
</html>
