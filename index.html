<!DOCTYPE html>
<html>
<head>
<title>Anodate</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh; /* chuẩn mobile */
}

/* CONTAINER */
.container {
    width: 100%;
    max-width: 600px;
    height: 100dvh;
    background: white;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* HEADER */
.header {
    background: #ff4d6d;
    color: white;
    padding: 18px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
    position: relative;
}

.settings-btn {
    position: absolute;
    right: 15px;
    top: 18px;
    font-size: 18px;
    cursor: pointer;
}

/* START BUTTON */
.start-btn {
    margin: 10px;
    padding: 14px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* MESSAGES */
.messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
}

.message {
    padding: 12px 16px;
    margin: 6px 0;
    border-radius: 18px;
    max-width: 80%;
    word-wrap: break-word;
    font-size: 15px;
}

.me {
    background: #dcf8c6;
    align-self: flex-end;
}

.stranger {
    background: #f1f0f0;
    align-self: flex-start;
}

.system {
    text-align: center;
    font-size: 12px;
    color: gray;
    margin: 6px 0;
}

/* INPUT AREA */
.input-area {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
    align-items: center;
    gap: 6px;
}

.input-area input {
    flex: 1;
    padding: 12px;
    border-radius: 25px;
    border: 1px solid #ccc;
    outline: none;
    font-size: 15px;
}

.send-btn {
    padding: 12px 18px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

.leave-btn {
    background: #ffe0e6;
    border: none;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    font-size: 18px;
    cursor: pointer;
}

/* SETTINGS */
.settings-panel {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
    padding: 20px;
    display: none;
    box-shadow: 0 -5px 20px rgba(0,0,0,0.2);
}

.settings-panel select {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 15px;
    border-radius: 10px;
}

.save-btn {
    width: 100%;
    padding: 14px;
    background: #ff4d6d;
    color: white;
    border: none;
    border-radius: 20px;
    font-size: 15px;
    cursor: pointer;
}

/* POPUP */
.popup-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    padding: 25px;
    border-radius: 20px;
    width: 85%;
    max-width: 350px;
    text-align: center;
}

.popup-buttons {
    margin-top: 20px;
    display: flex;
    gap: 10px;
}

.popup-buttons button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    cursor: pointer;
}

.cancel-btn {
    background: #ddd;
}

.confirm-btn {
    background: #ff4d6d;
    color: white;
}

/* DESKTOP */
@media (min-width: 768px) {
    .container {
        height: 680px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="header">
        🔥 Anodate 🔥
        <span class="settings-btn" onclick="toggleSettings()">⚙</span>
    </div>

    <button class="start-btn" onclick="findPartner()">Tìm người mới</button>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="msgInput" placeholder="Nhập tin nhắn..." disabled />
        <button class="send-btn" onclick="sendMessage()">Gửi</button>
        <button class="leave-btn" onclick="openPopup()">🚪</button>
    </div>

    <!-- SETTINGS -->
    <div class="settings-panel" id="settingsPanel">
        <h3>Cài đặt</h3>

        Giới tính của bạn:
        <select id="myGender">
            <option value="">-- Chọn --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Khác">Khác</option>
        </select>

        Bạn muốn tìm:
        <select id="findGender">
            <option value="">-- Chọn --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Any">Bất kỳ</option>
        </select>

        <button class="save-btn" onclick="saveSettings()">Lưu</button>
    </div>

    <!-- POPUP -->
    <div class="popup-overlay" id="popup">
        <div class="popup">
            <h3>Thoát cuộc trò chuyện?</h3>
            <p>Bạn có chắc chắn muốn rời đi không?</p>
            <div class="popup-buttons">
                <button class="cancel-btn" onclick="closePopup()">Ở lại</button>
                <button class="confirm-btn" onclick="leaveChat()">Thoát</button>
            </div>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();
let connected = false;
let myGender = "";
let findGender = "";

function toggleSettings() {
    const panel = document.getElementById("settingsPanel");
    panel.style.display = panel.style.display === "block" ? "none" : "block";
}

function saveSettings() {
    myGender = document.getElementById("myGender").value;
    findGender = document.getElementById("findGender").value;

    if (!myGender || !findGender) {
        alert("Vui lòng chọn đầy đủ thông tin!");
        return;
    }

    addSystem("Đã lưu cài đặt.");
    toggleSettings();

    // 🔥 TỰ ĐỘNG TÌM
    findPartner();
}

function findPartner() {
    if (!myGender || !findGender) {
        alert("Vui lòng vào Cài đặt trước!");
        return;
    }

    socket.emit("findPartner", { myGender, findGender });
    addSystem("Đang tìm người phù hợp...");
}

function sendMessage() {
    if (!connected) return;

    const input = document.getElementById("msgInput");
    const msg = input.value.trim();
    if (!msg) return;

    addMessage(msg, "me");
    socket.emit("chatMessage", msg);
    input.value = "";
}

function openPopup() {
    if (!connected) return;
    document.getElementById("popup").style.display = "flex";
}

function closePopup() {
    document.getElementById("popup").style.display = "none";
}

function leaveChat() {
    socket.emit("leaveChat");
    connected = false;
    document.getElementById("msgInput").disabled = true;

    addSystem("Bạn đã rời cuộc trò chuyện.");
    addSystem("👉 Bấm 'Tìm người mới' bên trên để tiếp tục.");

    closePopup();
}

function addMessage(text, type) {
    const div = document.createElement("div");
    div.classList.add("message", type);
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
    document.getElementById("messages").scrollTop =
        document.getElementById("messages").scrollHeight;
}

function addSystem(text) {
    const div = document.createElement("div");
    div.classList.add("system");
    div.innerText = text;
    document.getElementById("messages").appendChild(div);
}

socket.on("matched", (gender) => {
    connected = true;
    document.getElementById("msgInput").disabled = false;
    addSystem("Bạn đã kết nối với một " + gender);
});

socket.on("waiting", () => {
    addSystem("Đang chờ người phù hợp...");
});

socket.on("chatMessage", (msg) => {
    addMessage(msg, "stranger");
});

socket.on("partnerLeft", () => {
    connected = false;
    document.getElementById("msgInput").disabled = true;

    addSystem("Người kia đã rời đi.");
    addSystem("👉 Bấm 'Tìm người mới' bên trên để tiếp tục.");
});

document.getElementById("msgInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") sendMessage();
});

</script>

</body>
</html>
