<!DOCTYPE html>
<html>
<head>
    <title>Anodate</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #ff758c, #ff7eb3);
            height: 100vh;
        }

        .container {
            width: 100vw;
            height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* HEADER */
        .header {
            background: linear-gradient(90deg, #ff4d6d, #ff758c);
            color: white;
            padding: 18px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            position: relative;
            letter-spacing: 1px;
        }

        .settings-btn {
            position: absolute;
            right: 20px;
            top: 18px;
            cursor: pointer;
            font-size: 18px;
        }

        /* START BUTTON */
        .start-btn {
            margin: 15px auto;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff4d6d, #ff758c);
            color: white;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        /* CHAT AREA */
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            background: #fafafa;
        }

        /* MESSAGE BUBBLE */
        .message {
            padding: 12px 18px;
            margin: 8px 0;
            border-radius: 25px;
            max-width: 70%;
            font-size: 15px;
            animation: fadeIn 0.2s ease-in-out;
        }

        .me {
            background: linear-gradient(90deg, #ff758c, #ff4d6d);
            color: white;
            align-self: flex-end;
        }

        .stranger {
            background: #e9e9eb;
            align-self: flex-start;
        }

        .system {
            text-align: center;
            font-size: 13px;
            color: gray;
            margin: 10px 0;
        }

        /* INPUT AREA */
        .input-area {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border-radius: 30px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
        }

        .input-area button {
            margin-left: 10px;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(90deg, #ff4d6d, #ff758c);
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        /* SETTINGS PANEL */
        .settings-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
            padding: 25px;
            display: none;
            animation: slideUp 0.3s ease-out;
        }

        .settings-panel select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff4d6d, #ff758c);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        🔥 Anodate 🔥
        <span class="settings-btn" onclick="toggleSettings()">⚙</span>
    </div>

    <button class="start-btn" onclick="findPartner()">Tìm người mới</button>

    <div class="messages" id="messages"></div>

    <div class="input-area">
        <input id="msgInput" placeholder="Nhập tin nhắn..." disabled />
        <button onclick="sendMessage()">Gửi</button>
    </div>

    <!-- SETTINGS -->
    <div class="settings-panel" id="settingsPanel">
        <h3>Cài đặt</h3>

        Giới tính của bạn:
        <select id="myGender">
            <option value="">-- Chọn --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Khác">Khác</option>
        </select>

        Bạn muốn tìm:
        <select id="findGender">
            <option value="">-- Chọn --</option>
            <option value="Nam">Nam</option>
            <option value="Nữ">Nữ</option>
            <option value="Any">Bất kỳ</option>
        </select>

        <button class="save-btn" onclick="saveSettings()">Lưu</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let connected = false;
    let myGender = "";
    let findGender = "";

    function toggleSettings() {
        const panel = document.getElementById("settingsPanel");
        panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function saveSettings() {
        myGender = document.getElementById("myGender").value;
        findGender = document.getElementById("findGender").value;

        if (!myGender || !findGender) {
            alert("Vui lòng chọn đầy đủ thông tin!");
            return;
        }

        addSystem("Đã lưu cài đặt.");
        toggleSettings();
    }

    function findPartner() {
        if (!myGender || !findGender) {
            alert("Vui lòng vào Cài đặt trước!");
            return;
        }

        socket.emit("findPartner", { myGender, findGender });
        addSystem("Đang tìm người phù hợp...");
    }

    function sendMessage() {
        if (!connected) return;

        const input = document.getElementById("msgInput");
        const msg = input.value.trim();
        if (!msg) return;

        addMessage(msg, "me");
        socket.emit("chatMessage", msg);
        input.value = "";
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.classList.add("message", type);
        div.innerText = text;
        document.getElementById("messages").appendChild(div);
        document.getElementById("messages").scrollTop =
            document.getElementById("messages").scrollHeight;
    }

    function addSystem(text) {
        const div = document.createElement("div");
        div.classList.add("system");
        div.innerText = text;
        document.getElementById("messages").appendChild(div);
    }

    socket.on("matched", (gender) => {
        connected = true;
        document.getElementById("msgInput").disabled = false;
        addSystem("Bạn đã kết nối với một " + gender);
    });

    socket.on("waiting", () => {
        connected = false;
        addSystem("Đang chờ người phù hợp...");
    });

    socket.on("chatMessage", (msg) => {
        addMessage(msg, "stranger");
    });

    socket.on("partnerLeft", () => {
        connected = false;
        document.getElementById("msgInput").disabled = true;
        addSystem("Người kia đã rời cuộc trò chuyện.");
    });

    document.getElementById("msgInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
